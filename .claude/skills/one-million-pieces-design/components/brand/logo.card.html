<!-- @dsCard group="Components" viewport="700x300" name="Brand — Logo" subtitle="Mosaic mark + wordmark lockups" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 30px 34px; }
  .grid { display:flex; flex-wrap:wrap; gap:34px 52px; align-items:center; }
  .item { display:flex; flex-direction:column; gap:12px; }
  .cap { font-family: var(--font-mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color: var(--text-faint); }
  .lockup { display:flex; align-items:center; gap:15px; }
  .word { font-family: var(--font-serif); font-weight:560; letter-spacing:-0.015em; color: var(--text-primary); }
  rect.a { fill: var(--vermillion-600); } rect.i { fill: var(--ink-900); }
</style>
</head>
<body>
  <div class="grid">
    <div class="item">
      <span class="cap">Stacked</span>
      <div class="lockup">
        <svg width="42" height="42" viewBox="0 0 42 42"><rect class="i" x="0" y="0" width="9" height="9"/><rect class="i" x="11" y="0" width="9" height="9"/><rect class="i" x="33" y="0" width="9" height="9"/><rect class="i" x="0" y="11" width="9" height="9"/><rect class="a" x="11" y="11" width="9" height="9"/><rect class="i" x="22" y="11" width="9" height="9"/><rect class="i" x="11" y="22" width="9" height="9"/><rect class="a" x="22" y="22" width="9" height="9"/><rect class="i" x="33" y="22" width="9" height="9"/><rect class="i" x="0" y="33" width="9" height="9"/><rect class="i" x="22" y="33" width="9" height="9"/><rect class="a" x="33" y="33" width="9" height="9"/></svg>
        <span class="word" style="font-size:28px;line-height:0.98;">One&nbsp;Million<br>Pieces</span>
      </div>
    </div>
    <div class="item">
      <span class="cap">Horizontal</span>
      <div class="lockup">
        <svg width="26" height="26" viewBox="0 0 42 42"><rect class="i" x="0" y="0" width="9" height="9"/><rect class="i" x="11" y="0" width="9" height="9"/><rect class="i" x="33" y="0" width="9" height="9"/><rect class="i" x="0" y="11" width="9" height="9"/><rect class="a" x="11" y="11" width="9" height="9"/><rect class="i" x="22" y="11" width="9" height="9"/><rect class="i" x="11" y="22" width="9" height="9"/><rect class="a" x="22" y="22" width="9" height="9"/><rect class="i" x="33" y="22" width="9" height="9"/><rect class="i" x="0" y="33" width="9" height="9"/><rect class="i" x="22" y="33" width="9" height="9"/><rect class="a" x="33" y="33" width="9" height="9"/></svg>
        <span class="word" style="font-size:18px;">One Million Pieces</span>
      </div>
    </div>
    <div class="item">
      <span class="cap">Short</span>
      <div class="lockup">
        <svg width="22" height="22" viewBox="0 0 42 42"><rect class="i" x="0" y="0" width="9" height="9"/><rect class="i" x="11" y="0" width="9" height="9"/><rect class="i" x="33" y="0" width="9" height="9"/><rect class="i" x="0" y="11" width="9" height="9"/><rect class="a" x="11" y="11" width="9" height="9"/><rect class="i" x="22" y="11" width="9" height="9"/><rect class="i" x="11" y="22" width="9" height="9"/><rect class="a" x="22" y="22" width="9" height="9"/><rect class="i" x="33" y="22" width="9" height="9"/><rect class="i" x="0" y="33" width="9" height="9"/><rect class="i" x="22" y="33" width="9" height="9"/><rect class="a" x="33" y="33" width="9" height="9"/></svg>
        <span class="word" style="font-size:21px;font-weight:600;">OMP</span>
      </div>
    </div>
  </div>
</body>
</html>

<!-- @dsCard group="Colors" viewport="700x150" name="Neutral ramp" subtitle="Warm paper → ink, the working greys" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 24px; }
  .row { display: flex; gap: 6px; }
  .sw { flex: 1; text-align: center; }
  .chip { height: 60px; border-radius: var(--radius-xs); border: 1px solid var(--border-subtle); }
  .hex { font-family: var(--font-mono); font-size: 9.5px; color: var(--text-tertiary); margin-top: 5px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--paper-0)"></div><div class="hex">0</div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-50)"></div><div class="hex">50</div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-100)"></div><div class="hex">100</div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-200)"></div><div class="hex">200</div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-300)"></div><div class="hex">300</div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-400)"></div><div class="hex">400</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-400)"></div><div class="hex">i400</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-500)"></div><div class="hex">i500</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-700)"></div><div class="hex">i700</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><div class="hex">i900</div></div>
  </div>
</body>
</html>

<!-- @dsCard group="Colors" viewport="700x150" name="Data palette" subtitle="Categorical hues for charts, stable order" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 24px; }
  .row { display: flex; gap: 8px; }
  .sw { flex: 1; text-align: center; }
  .chip { height: 62px; border-radius: var(--radius-xs); }
  .name { font-family: var(--font-sans); font-size: 11px; color: var(--text-secondary); margin-top: 6px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--data-vermillion)"></div><div class="name">Vermillion</div></div>
    <div class="sw"><div class="chip" style="background:var(--data-teal)"></div><div class="name">Teal</div></div>
    <div class="sw"><div class="chip" style="background:var(--data-ochre)"></div><div class="name">Ochre</div></div>
    <div class="sw"><div class="chip" style="background:var(--data-olive)"></div><div class="name">Olive</div></div>
    <div class="sw"><div class="chip" style="background:var(--data-plum)"></div><div class="name">Plum</div></div>
    <div class="sw"><div class="chip" style="background:var(--data-sky)"></div><div class="name">Sky</div></div>
    <div class="sw"><div class="chip" style="background:var(--data-clay)"></div><div class="name">Clay</div></div>
    <div class="sw"><div class="chip" style="background:var(--data-gray)"></div><div class="name">Gray</div></div>
  </div>
</body>
</html>

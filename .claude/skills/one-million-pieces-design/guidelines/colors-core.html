<!-- @dsCard group="Colors" viewport="700x170" name="Core" subtitle="Paper, ink, vermillion — the whole brand in three" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 24px; }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border-subtle); }
  .chip { height: 74px; }
  .meta { padding: 8px 10px; background: var(--surface-card); }
  .name { font-family: var(--font-sans); font-weight: 600; font-size: 12.5px; color: var(--text-primary); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--paper-50)"></div><div class="meta"><div class="name">Paper</div><div class="hex">#F7F3EA</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><div class="meta"><div class="name">Ink</div><div class="hex">#1B1712</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--vermillion-600)"></div><div class="meta"><div class="name">Vermillion</div><div class="hex">#C63A22</div></div></div>
  </div>
</body>
</html>

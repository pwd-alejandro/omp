<!-- @dsCard group="Brand" viewport="700x260" name="Logotype" subtitle="Mosaic mark + Newsreader wordmark, all lockups" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 30px 34px; }
  .grid { display:flex; flex-wrap:wrap; gap:40px 56px; align-items:center; }
  .item { display:flex; flex-direction:column; gap:12px; }
  .cap { font-family: var(--font-mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color: var(--text-faint); }
  .lockup { display:flex; align-items:center; gap:16px; }
  .word { font-family: var(--font-serif); font-weight:560; letter-spacing:-0.015em; color: var(--text-primary); }
  svg { display:block; }
  rect.a { fill: var(--vermillion-600); }
  rect.i { fill: var(--ink-900); }
</style>
</head>
<body>
  <div class="grid">
    <div class="item">
      <span class="cap">Stacked · masthead</span>
      <div class="lockup">
        <svg width="44" height="44" viewBox="0 0 42 42"><rect class="i" x="0" y="0" width="9" height="9"/><rect class="i" x="11" y="0" width="9" height="9"/><rect class="i" x="33" y="0" width="9" height="9"/><rect class="i" x="0" y="11" width="9" height="9"/><rect class="a" x="11" y="11" width="9" height="9"/><rect class="i" x="22" y="11" width="9" height="9"/><rect class="i" x="11" y="22" width="9" height="9"/><rect class="a" x="22" y="22" width="9" height="9"/><rect class="i" x="33" y="22" width="9" height="9"/><rect class="i" x="0" y="33" width="9" height="9"/><rect class="i" x="22" y="33" width="9" height="9"/><rect class="a" x="33" y="33" width="9" height="9"/></svg>
        <span class="word" style="font-size:29px;line-height:0.98;">One&nbsp;Million<br>Pieces</span>
      </div>
    </div>
    <div class="item">
      <span class="cap">Horizontal</span>
      <div class="lockup">
        <svg width="26" height="26" viewBox="0 0 42 42"><rect class="i" x="0" y="0" width="9" height="9"/><rect class="i" x="11" y="0" width="9" height="9"/><rect class="i" x="33" y="0" width="9" height="9"/><rect class="i" x="0" y="11" width="9" height="9"/><rect class="a" x="11" y="11" width="9" height="9"/><rect class="i" x="22" y="11" width="9" height="9"/><rect class="i" x="11" y="22" width="9" height="9"/><rect class="a" x="22" y="22" width="9" height="9"/><rect class="i" x="33" y="22" width="9" height="9"/><rect class="i" x="0" y="33" width="9" height="9"/><rect class="i" x="22" y="33" width="9" height="9"/><rect class="a" x="33" y="33" width="9" height="9"/></svg>
        <span class="word" style="font-size:19px;">One Million Pieces</span>
      </div>
    </div>
    <div class="item">
      <span class="cap">Short</span>
      <div class="lockup">
        <svg width="24" height="24" viewBox="0 0 42 42"><rect class="i" x="0" y="0" width="9" height="9"/><rect class="i" x="11" y="0" width="9" height="9"/><rect class="i" x="33" y="0" width="9" height="9"/><rect class="i" x="0" y="11" width="9" height="9"/><rect class="a" x="11" y="11" width="9" height="9"/><rect class="i" x="22" y="11" width="9" height="9"/><rect class="i" x="11" y="22" width="9" height="9"/><rect class="a" x="22" y="22" width="9" height="9"/><rect class="i" x="33" y="22" width="9" height="9"/><rect class="i" x="0" y="33" width="9" height="9"/><rect class="i" x="22" y="33" width="9" height="9"/><rect class="a" x="33" y="33" width="9" height="9"/></svg>
        <span class="word" style="font-size:22px;font-weight:600;">OMP</span>
      </div>
    </div>
    <div class="item">
      <span class="cap">Mark · reversed</span>
      <div class="lockup" style="background:var(--ink-900);padding:14px;border-radius:var(--radius-sm);">
        <svg width="36" height="36" viewBox="0 0 42 42"><rect style="fill:var(--paper-50)" x="0" y="0" width="9" height="9"/><rect style="fill:var(--paper-50)" x="11" y="0" width="9" height="9"/><rect style="fill:var(--paper-50)" x="33" y="0" width="9" height="9"/><rect style="fill:var(--paper-50)" x="0" y="11" width="9" height="9"/><rect class="a" x="11" y="11" width="9" height="9"/><rect style="fill:var(--paper-50)" x="22" y="11" width="9" height="9"/><rect style="fill:var(--paper-50)" x="11" y="22" width="9" height="9"/><rect class="a" x="22" y="22" width="9" height="9"/><rect style="fill:var(--paper-50)" x="33" y="22" width="9" height="9"/><rect style="fill:var(--paper-50)" x="0" y="33" width="9" height="9"/><rect style="fill:var(--paper-50)" x="22" y="33" width="9" height="9"/><rect class="a" x="33" y="33" width="9" height="9"/></svg>
      </div>
    </div>
  </div>
</body>
</html>

<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="4px base — 4 · 8 · 12 · 16 · 24 · 32 · 48 · 64" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 26px 32px; }
  .row { display: flex; align-items: center; gap: 14px; margin-bottom: 9px; }
  .n { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); width: 54px; }
  .bar { height: 14px; background: var(--vermillion-600); border-radius: var(--radius-xs); }
</style>
</head>
<body>
  <div class="row"><span class="n">4</span><div class="bar" style="width:var(--space-1)"></div></div>
  <div class="row"><span class="n">8</span><div class="bar" style="width:var(--space-2)"></div></div>
  <div class="row"><span class="n">12</span><div class="bar" style="width:var(--space-3)"></div></div>
  <div class="row"><span class="n">16</span><div class="bar" style="width:var(--space-4)"></div></div>
  <div class="row"><span class="n">24</span><div class="bar" style="width:var(--space-6)"></div></div>
  <div class="row"><span class="n">32</span><div class="bar" style="width:var(--space-8)"></div></div>
  <div class="row"><span class="n">48</span><div class="bar" style="width:var(--space-12)"></div></div>
  <div class="row"><span class="n">64</span><div class="bar" style="width:var(--space-16)"></div></div>
</body>
</html>

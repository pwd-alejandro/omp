# pnpm settings. esbuild ships its platform binary via a postinstall build script;
# allow it so Astro/Vite can run. Both keys are included for cross-version safety:
# pnpm 11.x (local corepack) reads `allowBuilds`; pnpm 10.x (some CI/Cloudflare
# images) reads `onlyBuiltDependencies`. Unknown keys are ignored with a warning.
# See docs/06-setup-and-deployment.md.
allowBuilds:
  esbuild: true
onlyBuiltDependencies:
  - esbuild

<!-- @dsCard group="Components" viewport="720x420" name="Data — StatCallout, BarChart, Sparkline, DataTable" subtitle="The data storytelling primitives" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 28px 32px; }
  .cols { display:grid; grid-template-columns: 1fr 1fr; gap: 36px; }
  .h { font-family: var(--font-mono); font-size: 10px; letter-spacing:.08em; text-transform:uppercase; color: var(--text-faint); margin: 0 0 14px; }
  table { width:100%; border-collapse:collapse; }
  th { font-family:var(--font-mono); font-size:10px; font-weight:500; letter-spacing:.06em; text-transform:uppercase; color:var(--text-tertiary); padding:0 10px 7px; border-bottom:2px solid var(--border-strong); text-align:right; }
  th.l { text-align:left; }
  td { font-family:var(--font-mono); font-size:12.5px; font-weight:500; font-variant-numeric:tabular-nums; color:var(--text-primary); padding:9px 10px; border-bottom:1px solid var(--border-subtle); text-align:right; }
  td.l { font-family:var(--font-sans); font-weight:400; text-align:left; }
</style>
</head>
<body>
  <div class="cols">
    <div>
      <p class="h">StatCallout</p>
      <div style="display:flex;align-items:baseline;gap:10px;">
        <span style="font-family:var(--font-mono);font-weight:500;font-size:50px;line-height:.95;letter-spacing:-0.03em;font-variant-numeric:tabular-nums;color:var(--text-primary);">4.2M</span>
        <span style="font-family:var(--font-mono);font-weight:600;font-size:15px;color:var(--status-negative);">+46%</span>
      </div>
      <div style="font-family:var(--font-sans);font-size:13.5px;font-weight:500;color:var(--text-secondary);margin-top:8px;max-width:230px;line-height:1.35;">Eviction filings analysed since 2016</div>
      <div style="font-family:var(--font-mono);font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--text-faint);margin-top:8px;">County records</div>

      <p class="h" style="margin-top:26px;">Bar chart</p>
      <div style="display:flex;align-items:flex-end;gap:8px;height:96px;">
        <div style="flex:1;height:32%;background:var(--data-teal);border-radius:var(--radius-xs) var(--radius-xs) 0 0;"></div>
        <div style="flex:1;height:48%;background:var(--data-teal);border-radius:var(--radius-xs) var(--radius-xs) 0 0;"></div>
        <div style="flex:1;height:60%;background:var(--data-teal);border-radius:var(--radius-xs) var(--radius-xs) 0 0;"></div>
        <div style="flex:1;height:74%;background:var(--data-teal);border-radius:var(--radius-xs) var(--radius-xs) 0 0;"></div>
        <div style="flex:1;height:100%;background:var(--vermillion-600);border-radius:var(--radius-xs) var(--radius-xs) 0 0;"></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:6px;border-top:1px solid var(--border-subtle);padding-top:5px;">
        <span style="flex:1;text-align:center;font-family:var(--font-sans);font-size:10px;color:var(--text-tertiary);">17</span>
        <span style="flex:1;text-align:center;font-family:var(--font-sans);font-size:10px;color:var(--text-tertiary);">18</span>
        <span style="flex:1;text-align:center;font-family:var(--font-sans);font-size:10px;color:var(--text-tertiary);">19</span>
        <span style="flex:1;text-align:center;font-family:var(--font-sans);font-size:10px;color:var(--text-tertiary);">20</span>
        <span style="flex:1;text-align:center;font-family:var(--font-sans);font-size:10px;color:var(--text-tertiary);">21</span>
      </div>
    </div>
    <div>
      <p class="h">Sparkline</p>
      <svg width="150" height="40" style="overflow:visible;display:block;">
        <path d="M2 34 L26 30 L50 32 L74 20 L98 22 L122 9 L146 3" fill="none" stroke="var(--data-teal)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="146" cy="3" r="3" fill="var(--data-teal)"/>
      </svg>

      <p class="h" style="margin-top:26px;">Data table</p>
      <table>
        <thead><tr><th class="l">Year</th><th>Filings</th><th>YoY</th></tr></thead>
        <tbody>
          <tr><td class="l">2019</td><td>55,180</td><td>—</td></tr>
          <tr><td class="l">2020</td><td>60,204</td><td>+9%</td></tr>
          <tr style="background:var(--vermillion-100);"><td class="l">2021</td><td>88,110</td><td>+46%</td></tr>
        </tbody>
      </table>
      <div style="font-family:var(--font-mono);font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--text-faint);margin-top:10px;">Source: county records</div>
    </div>
  </div>
</body>
</html>
